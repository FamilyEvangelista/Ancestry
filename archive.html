<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive — The Whitfield Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="site-title">
    <span class="archive-mark">Est. records from 1888</span>
    The Whitfield Archive
  </div>
  <nav class="site-nav">
    <a href="index.html">Home</a>
    <a href="tree.html">Family Tree</a>
    <a href="archive.html" aria-current="page">Archive</a>
  </nav>
</header>

<div class="archive-controls">
  <select id="filter-person">
    <option value="all">All people</option>
  </select>
  <select id="filter-type">
    <option value="all">All record types</option>
    <option value="photo">Photographs</option>
    <option value="document">Documents</option>
    <option value="video">Film / Video</option>
  </select>
  <input id="filter-search" type="text" placeholder="Search by title or name…">
</div>

<div class="archive-grid" id="archive-grid"></div>

<footer class="site-footer">
  Kept and maintained by the family. Updated by hand.
</footer>

<script src="js/common.js"></script>
<script src="js/archive.js"></script>
</body>
</html>
